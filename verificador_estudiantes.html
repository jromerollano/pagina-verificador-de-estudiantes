<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificación de Estudiantes</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#07090f; --bg2:#0e1119; --bg3:#151822;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
      --accent:#4f8ef7; --accent2:#7b5cf0;
      --success:#22c97a; --danger:#f25c5c;
      --text1:#eef0f7; --text2:#8b90a8; --text3:#4e5368;
      --glow-s:rgba(34,201,122,0.15); --glow-d:rgba(242,92,92,0.15);
    }
    body {
      font-family:'Sora',sans-serif; background:var(--bg); color:var(--text1);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:2rem 1rem; overflow-x:hidden;
    }
    body::before {
      content:''; position:fixed; inset:0; z-index:0;
      background-image:linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);
      background-size:40px 40px; pointer-events:none;
    }
    body::after {
      content:''; position:fixed; inset:0; z-index:0;
      background:radial-gradient(ellipse 600px 400px at 20% 20%,rgba(79,142,247,0.07) 0%,transparent 70%),radial-gradient(ellipse 500px 350px at 80% 80%,rgba(123,92,240,0.06) 0%,transparent 70%);
      pointer-events:none;
    }
    .wrap { width:100%; max-width:480px; position:relative; z-index:1; }
    .header { text-align:center; margin-bottom:2.5rem; animation:fadeDown 0.6s ease both; }
    .badge {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(79,142,247,0.08); border:1px solid rgba(79,142,247,0.2);
      border-radius:100px; padding:4px 12px; font-size:11px;
      color:var(--accent); letter-spacing:0.05em; font-weight:500; margin-bottom:14px;
    }
    .badge span { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:blink 2s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .logo-wrap {
      display:inline-flex; align-items:center; justify-content:center;
      width:68px; height:68px; border-radius:20px;
      background:linear-gradient(135deg,rgba(79,142,247,0.2),rgba(123,92,240,0.2));
      border:1px solid rgba(79,142,247,0.3); margin-bottom:1.25rem; position:relative;
    }
    .logo-wrap::before {
      content:''; position:absolute; inset:-1px; border-radius:20px;
      background:linear-gradient(135deg,rgba(79,142,247,0.4),rgba(123,92,240,0.4));
      z-index:-1; filter:blur(8px); opacity:0.5;
    }
    .logo-wrap svg { width:28px; height:28px; stroke:var(--accent); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
    .header h1 {
      font-size:24px; font-weight:700; letter-spacing:-0.5px;
      background:linear-gradient(135deg,#eef0f7 30%,#8b90a8);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .header p { font-size:13.5px; color:var(--text2); margin-top:6px; font-weight:300; line-height:1.5; }
    .card {
      background:var(--bg2); border:1px solid var(--border2);
      border-radius:20px; padding:1.75rem;
      animation:fadeUp 0.6s ease 0.1s both; position:relative; overflow:hidden;
    }
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(79,142,247,0.5),rgba(123,92,240,0.5),transparent);
    }
    label { font-size:11.5px; font-weight:600; color:var(--text3); display:block; margin-bottom:8px; letter-spacing:0.1em; text-transform:uppercase; }
    .input-row { display:flex; gap:10px; }
    .input-row input {
      flex:1; height:48px; background:var(--bg3); border:1px solid var(--border2);
      border-radius:12px; padding:0 16px; font-size:15px; font-weight:500;
      font-family:'JetBrains Mono',monospace; color:var(--text1);
      transition:border-color 0.2s,box-shadow 0.2s; letter-spacing:0.05em;
    }
    .input-row input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,142,247,0.12); }
    .input-row input::placeholder { font-family:'Sora',sans-serif; color:var(--text3); font-size:13px; font-weight:400; letter-spacing:0; }
    .btn {
      height:48px; padding:0 22px; border-radius:12px; border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      font-size:13.5px; font-weight:600; font-family:'Sora',sans-serif;
      color:#fff; cursor:pointer; white-space:nowrap;
      transition:opacity 0.15s,transform 0.12s,box-shadow 0.2s;
      box-shadow:0 4px 20px rgba(79,142,247,0.3);
    }
    .btn:hover { opacity:0.9; box-shadow:0 6px 28px rgba(79,142,247,0.45); transform:translateY(-1px); }
    .btn:active { transform:scale(0.97) translateY(0); }
    .loading { display:none; align-items:center; gap:10px; margin-top:1.25rem; color:var(--text2); font-size:13px; }
    .loading.visible { display:flex; }
    .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay:0.2s; background:var(--accent2); }
    .dot:nth-child(3) { animation-delay:0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.1)} }
    .result { display:none; margin-top:1.25rem; border-radius:14px; padding:1.1rem 1.25rem; }
    .result.visible { display:flex; align-items:flex-start; gap:12px; animation:fadeUp 0.3s ease both; }
    .result.success { background:rgba(34,201,122,0.08); border:1px solid rgba(34,201,122,0.25); box-shadow:0 0 24px var(--glow-s); }
    .result.danger  { background:rgba(242,92,92,0.08);  border:1px solid rgba(242,92,92,0.25);  box-shadow:0 0 24px var(--glow-d); }
    .result-icon { width:22px; height:22px; flex-shrink:0; margin-top:1px; }
    .result-title { font-size:13.5px; font-weight:600; }
    .result.success .result-title { color:var(--success); }
    .result.danger  .result-title { color:var(--danger); }
    .result-detail { font-size:12.5px; color:var(--text2); margin-top:5px; line-height:1.6; }
    .student-info { margin-top:12px; display:flex; flex-direction:column; gap:0; }
    .info-row { display:flex; justify-content:space-between; align-items:center; font-size:12px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
    .info-row:last-child { border-bottom:none; }
    .info-row span:first-child { color:var(--text3); font-weight:500; letter-spacing:0.04em; text-transform:uppercase; font-size:10.5px; }
    .info-row span:last-child  { color:var(--text1); font-weight:500; font-family:'JetBrains Mono',monospace; font-size:12px; }
    .divider { height:1px; background:linear-gradient(90deg,transparent,var(--border2),transparent); margin:2rem 0; }
    .hint { font-size:11.5px; color:var(--text3); text-align:center; animation:fadeUp 0.6s ease 0.2s both; }
    .chips { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; justify-content:center; }
    .chip {
      font-size:11px; padding:4px 12px; border-radius:100px;
      background:var(--bg3); border:1px solid var(--border2);
      color:var(--text2); cursor:pointer; font-family:'JetBrains Mono',monospace;
      transition:all 0.15s;
    }
    .chip:hover { background:rgba(79,142,247,0.12); color:var(--accent); border-color:rgba(79,142,247,0.35); transform:translateY(-1px); }
    .footer { text-align:center; margin-top:2rem; font-size:11px; color:var(--text3); animation:fadeUp 0.6s ease 0.3s both; }
    .footer code { font-family:'JetBrains Mono',monospace; color:var(--accent); font-size:10.5px; }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:none} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(14px)}  to{opacity:1;transform:none} }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="badge"><span></span> Sistema Académico</div>
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>Verificador de Estudiantes</h1>
    <p>Consulta si una persona está registrada en el sistema académico</p>
  </div>

  <div class="card">
    <label for="cedula">Número de cédula</label>
    <div class="input-row">
      <input type="text" id="cedula" placeholder="Ej: 1023456789" maxlength="12" inputmode="numeric" />
      <button class="btn" onclick="consultar()">Consultar</button>
    </div>
    <div class="loading" id="loading">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <span>Verificando en el sistema...</span>
    </div>
    <div class="result" id="result">
      <div class="result-icon" id="result-icon"></div>
      <div style="flex:1">
        <div class="result-title" id="result-title"></div>
        <div id="result-extra"></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="hint">
    <p>Prueba con estas cédulas registradas:</p>
    <div class="chips" id="chips"></div>
  </div>

  <div class="footer">Sistema de Verificación Académica &mdash; <code>Node.js + Excel + Render</code></div>
</div>

<script>
  const API_BASE = (window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1') ? 'http://localhost:3000' : '';

  const iconCheck = `<svg viewBox="0 0 22 22" fill="none" width="22" height="22"><circle cx="11" cy="11" r="10" stroke="#22c97a" stroke-width="1.5"/><path d="M7 11.5l2.8 2.8 5-5.5" stroke="#22c97a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const iconX     = `<svg viewBox="0 0 22 22" fill="none" width="22" height="22"><circle cx="11" cy="11" r="10" stroke="#f25c5c" stroke-width="1.5"/><path d="M7.5 7.5l7 7M14.5 7.5l-7 7" stroke="#f25c5c" stroke-width="1.8" stroke-linecap="round"/></svg>`;

  async function cargarChips() {
    try {
      const res = await fetch(`${API_BASE}/api/cedulas`);
      const data = await res.json();
      const cont = document.getElementById('chips');
      data.forEach(c => {
        const el = document.createElement('span');
        el.className='chip'; el.textContent=c; el.onclick=()=>probar(c);
        cont.appendChild(el);
      });
    } catch {}
  }
  cargarChips();

  function probar(val) { document.getElementById('cedula').value=val; consultar(); }

  async function consultar() {
    const input=document.getElementById('cedula');
    const cedula=input.value.trim().replace(/\s/g,'');
    const resultEl=document.getElementById('result');
    const loadingEl=document.getElementById('loading');
    if (!cedula) { input.focus(); return; }
    resultEl.className='result';
    loadingEl.className='loading visible';
    try {
      const res=await fetch(`${API_BASE}/api/verificar/${cedula}`);
      const data=await res.json();
      loadingEl.className='loading';
      if (data.encontrado) {
        resultEl.className='result visible success';
        document.getElementById('result-icon').innerHTML=iconCheck;
        document.getElementById('result-title').textContent='Esta persona sí es estudiante.';
        document.getElementById('result-extra').innerHTML=`
          <div class="student-info">
            <div class="info-row"><span>Nombre</span><span>${data.nombre}</span></div>
            <div class="info-row"><span>Programa</span><span>${data.programa}</span></div>
            <div class="info-row"><span>Semestre</span><span>${data.semestre}</span></div>
            <div class="info-row"><span>Jornada</span><span>${data.jornada}</span></div>
            <div class="info-row"><span>Estado</span><span>${data.estado}</span></div>
            <div class="info-row"><span>Cédula</span><span>${data.cedula}</span></div>
          </div>`;
      } else {
        resultEl.className='result visible danger';
        document.getElementById('result-icon').innerHTML=iconX;
        document.getElementById('result-title').textContent='Esta persona no está registrada.';
        document.getElementById('result-extra').innerHTML=`<div class="result-detail">La cédula <strong style="color:var(--text1)">${data.cedula}</strong> no se encontró en el sistema. Verifica el número o contacta a la institución.</div>`;
      }
    } catch {
      loadingEl.className='loading';
      resultEl.className='result visible danger';
      document.getElementById('result-icon').innerHTML=iconX;
      document.getElementById('result-title').textContent='Error al conectar con el servidor.';
      document.getElementById('result-extra').innerHTML=`<div class="result-detail">Verifica que el servidor esté activo.</div>`;
    }
  }

  document.getElementById('cedula').addEventListener('keydown', e => { if(e.key==='Enter') consultar(); });
</script>
</body>
</html>
